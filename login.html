<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Remote - Вход</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-md navbar-light bg-light fixed-top">
    <a class="navbar-brand font-weight-bold" href="./login.html">Learn Remote</a>
  </nav>

  <div class="container">
    <div class="login-container">
      <h2 class="text-center mb-4">Вход в систему</h2>
      
      <form id="loginForm">
        <div class="form-group">
          <input type="email" class="form-control" id="email" placeholder="Email" required>
        </div>
        <div class="form-group">
          <input type="password" class="form-control" id="password" placeholder="Пароль" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Войти</button>
      </form>

      <div class="text-center mt-3">
        <a href="./register.html" class="btn btn-outline-secondary btn-block">Регистрация</a>
      </div>

      <div id="loginMessage" class="mt-3"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="./js/scripts.js"></script>
</body>
</html>
