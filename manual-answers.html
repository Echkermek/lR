<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мир на ладони - Ручная проверка</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-md navbar-light bg-light fixed-top">
  <a class="navbar-brand font-weight-bold" href="./courses.html">Мир на ладони</a>
  <div class="navbar-nav mr-auto">
    <a class="nav-link" href="./courses.html">Курсы</a>
    <a class="nav-link" href="./groups.html">Группы</a>
    <a class="nav-link" href="./notifications.html">Уведомления</a>
    <a class="nav-link" href="./material.html">Материалы</a>
    <a class="nav-link" href="./debtors.html">Должники</a>
    <a class="nav-link active" href="./manual-answers.html">Проверка ответов</a>
    <a class="nav-link admin-link" href="./admin.html">Админ</a>
  </div>
  <div class="navbar-text mr-3">
    <strong id="teacherName"></strong>
  </div>
  <a class="nav-link text-danger font-weight-bold" href="#" onclick="logout()">Выход</a>
</nav>

  <div class="container">
    <h2 class="mb-4">Ручная проверка работ</h2>

    <div class="filter-section">
      <div class="form-row">
        <div class="form-group col-md-6">
          <label for="groupFilter">Выберите группу:</label>
          <select id="groupFilter" class="form-control" onchange="loadManualAnswers()">
            <option value="">Все группы</option>
          </select>
        </div>
      </div>
    </div>

    <ul class="nav nav-tabs" id="answerTabs" role="tablist">
      <li class="nav-item">
        <a class="nav-link active" id="pending-tab" data-toggle="tab" href="#pending" role="tab">
          Непроверенные <span class="badge badge-danger ml-1" id="pendingCount">0</span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" id="checked-tab" data-toggle="tab" href="#checked" role="tab">
           Проверенные <span class="badge badge-success ml-1" id="checkedCount">0</span>
        </a>
      </li>
    </ul>

    <div class="tab-content" id="answerTabsContent">
      <div class="tab-pane fade show active" id="pending" role="tabpanel">
        <div id="pendingAnswersList" class="mt-3">
          <div class="text-center">
            <div class="spinner-border text-primary" role="status">
              <span class="sr-only">Загрузка...</span>
            </div>
            <p class="mt-2">Загрузка работ...</p>
          </div>
        </div>
      </div>

      <div class="tab-pane fade" id="checked" role="tabpanel">
        <div id="checkedAnswersList" class="mt-3">
          <div class="text-center">
            <div class="spinner-border text-primary" role="status">
              <span class="sr-only">Загрузка...</span>
            </div>
            <p class="mt-2">Загрузка работ...</p>
          </div>
        </div>
      </div>
    </div>
  </div>


  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
  <script src="./js/scripts.js"></script>
  <script src="./js/manual-answers.js"></script>
</body>
</html>
