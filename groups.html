<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Remote - Группы</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <style>
    body { padding-top: 80px; background-color: #f8f9fa; }
    .btn-primary { background-color: #17a2b8; border-color: #17a2b8; }
    .group-item { 
      margin-bottom: 10px;
      cursor: pointer;
    }
    .group-item:hover { background-color: #f8f9fa; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-md navbar-light bg-light fixed-top">
    <a class="navbar-brand font-weight-bold" href="./courses.html">Learn Remote</a>
    <div class="navbar-nav mr-auto">
      <a class="nav-link" href="./courses.html">Курсы</a>
      <a class="nav-link" href="./groups.html">Группы</a>
      <a class="nav-link" href="./notifications.html">Уведомления</a>
      <a class="nav-link" href="./material.html">Материалы</a>
      <a class="nav-link active" href="./admin.html">Админ</a>
    </div>
    <div class="navbar-text mr-3">
      <strong id="teacherName"></strong>
    </div>
    <a class="nav-link text-danger font-weight-bold" href="#" onclick="logout()">Exit</a>
  </nav>

  <div class="container">
    <h2 class="mb-4">Группы</h2>
    
    <div class="card mb-4">
      <div class="card-header bg-info text-white">
        <h5 class="mb-0">Список групп</h5>
      </div>
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead class="thead-light">
            <tr>
              <th>Название группы</th>
              <th width="120">Действия</th>
            </tr>
          </thead>
          <tbody id="groupsBody"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div class="card-header bg-info text-white">
        <h5 class="mb-0">Добавить новую группу</h5>
      </div>
      <div class="card-body">
        <div class="input-group">
          <input type="text" id="newGroupName" class="form-control" placeholder="Название новой группы">
          <div class="input-group-append">
            <button class="btn btn-primary" onclick="addGroup()">Добавить группу</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD2QJQcuUI9lCJP_kqp5tW24J8TN6phPWw",
      authDomain: "prob1-5c047.firebaseapp.com",
      projectId: "prob1-5c047",
      storageBucket: "prob1-5c047.appspot.com",
      messagingSenderId: "1083579621866",
      appId: "1:1083579621866:web:73f214d8fd992f0d52d293"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    if (!localStorage.getItem('teacherId')) {
      window.location.href = './login.html';
    }

    function logout() {
      localStorage.removeItem('teacherId');
      window.location.href = './login.html';
    }

    const tbody = document.getElementById("groupsBody");
    
    db.collection("groups").orderBy("name").onSnapshot(snap => {
      tbody.innerHTML = "";
      
      if (snap.empty) {
        tbody.innerHTML = `<tr><td colspan="2" class="text-center text-muted">Нет групп</td></tr>`;
        return;
      }
      
      snap.forEach(doc => {
        const g = doc.data();
        const tr = document.createElement("tr");
        tr.className = "group-item";
        tr.innerHTML = `
          <td onclick="showGroupCourses('${doc.id}', '${g.name}')">${g.name}</td>
          <td>
            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation(); deleteGroup('${doc.id}')">Удалить</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    });

    function addGroup() {
      const name = document.getElementById("newGroupName").value.trim();
      if (!name) {
        alert("Введите название группы");
        return;
      }
      
      db.collection("groups").add({name}).then(() => {
        document.getElementById("newGroupName").value = "";
      }).catch(error => {
        alert("Ошибка создания группы: " + error.message);
      });
    }
    
    function deleteGroup(id) {
      if (confirm("Вы уверены, что хотите удалить эту группу?")) {
        db.collection("groups").doc(id).delete().catch(error => {
          alert("Ошибка удаления группы: " + error.message);
        });
      }
    }

    function showGroupCourses(groupId, groupName) {
      localStorage.setItem('currentGroupId', groupId);
      localStorage.setItem('currentGroupName', groupName);
      window.location.href = './group-courses.html';
    }
  </script>
</body>
</html>
