<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Remote - Уведомления</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-md navbar-light bg-light fixed-top">
    <a class="navbar-brand font-weight-bold" href="./courses.html">Learn Remote</a>
    <div class="navbar-nav mr-auto">
      <a class="nav-link active" href="./courses.html">Курсы</a>
      <a class="nav-link" href="./groups.html">Группы</a>
      <a class="nav-link" href="./notifications.html">Уведомления</a>
      <a class="nav-link" href="./material.html">Материалы</a>
      <a class="nav-link" href="./debtors.html">Должники</a>
      <a class="nav-link" href="./manual-answers.html">Проверка ответов</a>
      <a class="nav-link" href="./admin.html">Админ</a>
    </div>
    <div class="navbar-text mr-3">
      <strong id="teacherName"></strong>
    </div>
    <a class="nav-link text-danger font-weight-bold" href="#" onclick="logout()">Exit</a>
  </nav>

  <div class="container">
    <h2 class="mb-4">Отправка сообщений</h2>
    
    <div class="card mb-4">
      <div class="card-header bg-info text-white">
        <h5 class="mb-0">Новое сообщение</h5>
      </div>
      <div class="card-body">
        <form id="messageForm">
          <div class="form-group">
            <label for="recipientType">Кому отправить:</label>
            <select id="recipientType" class="form-control" required>
              <option value="group">Группе</option>
              <option value="student">Студенту</option>
            </select>
          </div>
          
          <div class="form-group" id="groupField">
            <label for="groupSelect">Выберите группу:</label>
            <select id="groupSelect" class="form-control" required>
              <option value="">Загрузка групп...</option>
            </select>
          </div>

          <div class="form-group d-none" id="studentField">
            <label for="studentSelect">Выберите студента:</label>
            <select id="studentSelect" class="form-control">
              <option value="">Сначала выберите группу</option>
            </select>
          </div>

          <div class="form-group">
            <label for="messageText">Текст сообщения:</label>
            <textarea class="form-control" id="messageText" rows="3" placeholder="Введите текст сообщения" required></textarea>
          </div>
          
          <button type="submit" class="btn btn-primary btn-block">
            <span id="sendButtonText">Отправить сообщение</span>
            <span id="sendButtonSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
          </button>
        </form>
      </div>
    </div>

    <div class="card">
      <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
        <h5 class="mb-0">История сообщений</h5>
        <div>
          <span class="badge badge-light mr-2" id="totalCount">0</span>
          <span class="badge badge-info mr-2" id="groupCount">0 групп</span>
          <span class="badge badge-success" id="studentCount">0 студентов</span>
        </div>
      </div>
      <div class="card-body p-0">
        <div id="messagesList" class="p-3">
          <div class="text-center text-muted">Загрузка сообщений...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
  <script src="./js/notifications.js"></script>
</body>
</html>
