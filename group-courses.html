<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Remote - Курсы группы</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-md navbar-light bg-light fixed-top">
    <a class="navbar-brand font-weight-bold" href="./courses.html">Learn Remote</a>
    <div class="navbar-nav mr-auto">
      <a class="nav-link active" href="./courses.html">Курсы</a>
      <a class="nav-link" href="./groups.html">Группы</a>
      <a class="nav-link" href="./notifications.html">Уведомления</a>
      <a class="nav-link" href="./material.html">Материалы</a>
      <a class="nav-link" href="./debtors.html">Должники</a>
      <a class="nav-link" href="./manual-answers.html">Проверка ответов</a>
      <a class="nav-link" href="./admin.html">Админ</a>
    </div>
    <div class="navbar-text mr-3">
      <strong id="teacherName"></strong>
    </div>
    <a class="nav-link text-danger font-weight-bold" href="#" onclick="logout()">Выход</a>
  </nav>

  <div class="container">
    <div class="back-btn">
      <button class="btn btn-secondary" onclick="goBack()">← Назад к группам</button>
    </div>
    
    <div class="text-center mb-4">
      <h1 id="groupNameTitle">Загрузка...</h1>
    </div>
    
    <div class="card">
      <div class="card-header bg-info text-white">
        <h5 class="mb-0">Список курсов группы</h5>
      </div>
      <div class="card-body">
        <div id="coursesList">
          <div class="text-center">
            <div class="spinner-border text-primary" role="status">
              <span class="sr-only">Загрузка...</span>
            </div>
            <p class="mt-2">Загрузка курсов...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="./js/scripts.js"></script>
  <script>
    // Функция для возврата к списку групп
    function goBack() {
      window.location.href = './groups.html';
    }

    // Инициализация страницы
    document.addEventListener('DOMContentLoaded', function() {
      console.log('Страница group-courses.html загружена');
      
      // Проверяем авторизацию
      if (!localStorage.getItem('teacherId')) {
        window.location.href = './login.html';
        return;
      }

      // Загружаем данные группы
      const groupId = localStorage.getItem('currentGroupId');
      const groupName = localStorage.getItem('currentGroupName');
      
      console.log('ID группы:', groupId);
      console.log('Название группы:', groupName);
      
      if (!groupId || !groupName) {
        console.error('Данные группы не найдены в localStorage');
        window.location.href = './groups.html';
        return;
      }
      
      document.getElementById('groupNameTitle').textContent = groupName;
      
      // Загружаем курсы группы
      loadGroupCourses(groupId);
    });

    // Загрузка курсов группы
    async function loadGroupCourses(groupId) {
      const coursesList = document.getElementById('coursesList');
      
      try {
        console.log('Загрузка курсов для группы:', groupId);
        
        // Получаем курсы группы из коллекции course_groups
        const courseGroupsSnapshot = await db.collection("course_groups")
          .where("groupId", "==", groupId)
          .get();

        console.log('Найдено записей course_groups:', courseGroupsSnapshot.size);

        if (courseGroupsSnapshot.empty) {
          coursesList.innerHTML = '<p class="text-center text-muted">У этой группы нет курсов</p>';
          return;
        }

        coursesList.innerHTML = '';
        
        for (const doc of courseGroupsSnapshot.docs) {
          const data = doc.data();
          const courseId = data.courseId;
          const semester = data.semester || 'Не указан';
          
          console.log('Загрузка курса:', courseId);
          
          // Получаем информацию о курсе
          const courseDoc = await db.collection("courses").doc(courseId).get();
          
          if (courseDoc.exists) {
            const courseData = courseDoc.data();
            const courseName = courseData.name || 'Без названия';
            const isCompleted = courseData.completed || false;
            
            const courseItem = document.createElement('div');
            courseItem.className = 'card mb-3 course-item';
            courseItem.style.cursor = 'pointer';
            courseItem.onclick = () => showCoursePerformance(courseId, courseName);
            
            courseItem.innerHTML = `
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-center">
                  <div>
                    <h5 class="card-title mb-1">${courseName}</h5>
                    <p class="card-text text-muted">
                      <small>Семестр: ${semester}</small>
                      ${isCompleted ? '<br><small class="text-secondary">Курс завершен</small>' : ''}
                    </p>
                  </div>
                  <span class="badge badge-info">Подробнее →</span>
                </div>
              </div>
            `;
            
            coursesList.appendChild(courseItem);
          } else {
            console.warn('Курс не найден:', courseId);
          }
        }
        
      } catch (error) {
        console.error("Ошибка загрузки курсов:", error);
        coursesList.innerHTML = `
          <div class="alert alert-danger">
            Ошибка загрузки курсов: ${error.message}
          </div>
        `;
      }
    }

    // Переход к успеваемости по курсу
    function showCoursePerformance(courseId, courseName) {
      console.log('Переход к курсу:', courseName);
      localStorage.setItem('currentCourseId', courseId);
      localStorage.setItem('currentCourseName', courseName);
      window.location.href = './course-performance.html';
    }
  </script>
</body>
</html>
