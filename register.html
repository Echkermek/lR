<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Remote - Регистрация</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <style>
    body { padding-top: 80px; background-color: #f8f9fa; }
    .register-container { max-width: 400px; margin: 0 auto; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-md navbar-light bg-light fixed-top">
    <a class="navbar-brand font-weight-bold" href="./login.html">Learn Remote</a>
  </nav>

  <div class="container">
    <div class="register-container">
      <h2 class="text-center mb-4">Регистрация </h2>
      
      <form id="registerForm">
        <div class="form-group">
          <input type="text" class="form-control" id="name" placeholder="Имя" required>
        </div>
        <div class="form-group">
          <input type="text" class="form-control" id="surname" placeholder="Фамилия" required>
        </div>
        <div class="form-group">
          <input type="email" class="form-control" id="email" placeholder="Электронная почта" required>
        </div>
        <div class="form-group">
          <input type="password" class="form-control" id="password" placeholder="Пароль" required>
        </div>
        <div class="form-group">
          <input type="text" class="form-control" id="inviteCode" placeholder="Код приглашения" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
      </form>

      <div class="text-center mt-3">
        <a href="./login.html" class="btn btn-outline-secondary btn-block">Отмена</a>
      </div>

      <div id="registerMessage" class="mt-3"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD2QJQcuUI9lCJP_kqp5tW24J8TN6phPWw",
      authDomain: "prob1-5c047.firebaseapp.com",
      projectId: "prob1-5c047",
      storageBucket: "prob1-5c047.appspot.com",
      messagingSenderId: "1083579621866",
      appId: "1:1083579621866:web:73f214d8fd992f0d52d293"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const surname = document.getElementById('surname').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const inviteCode = document.getElementById('inviteCode').value;
      const messageDiv = document.getElementById('registerMessage');

      // Проверяем код приглашения
      db.collection('invite_codes').where('code', '==', inviteCode).get()
        .then((snapshot) => {
          if (snapshot.empty) {
            throw new Error('Неверный код приглашения');
          }
          
          const codeDoc = snapshot.docs[0];
          const codeData = codeDoc.data();
          
          if (codeData.used) {
            throw new Error('Этот код приглашения уже использован');
          }
          
          // Создаем пользователя в Firebase Auth
          return auth.createUserWithEmailAndPassword(email, password)
            .then((userCredential) => {
              return db.collection('teacher').add({
                name: name,
                surname: surname,
                login: email,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                last_login_time: firebase.firestore.FieldValue.serverTimestamp()
              });
            })
            .then((teacherRef) => {
              return db.collection('invite_codes').doc(codeDoc.id).update({
                used: true,
                usedBy: teacherRef.id,
                usedAt: firebase.firestore.FieldValue.serverTimestamp()
              });
            });
        })
        .then(() => {
          messageDiv.innerHTML = '<div class="alert alert-success">Регистрация успешна! Вы будете перенаправлены на страницу входа.</div>';
          setTimeout(() => {
            window.location.href = './login.html';
          }, 2000);
        })
        .catch((error) => {
          console.error("Ошибка регистрации:", error);
          messageDiv.innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
        });
    });
  </script>
</body>
</html>
