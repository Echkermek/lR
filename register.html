<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мир на ладони - Регистрация</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="./css/style.css">
  <style>
    /* Дополнительные стили для позиционирования иконки глаза */
    .password-toggle {
      position: relative;
    }
    .password-toggle .toggle-eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #6c757d;
      background: transparent;
      border: none;
      outline: none;
      font-size: 1.1rem;
      padding: 0;
      line-height: 1;
      z-index: 5;
    }
    .password-toggle .toggle-eye:hover {
      color: #343a40;
    }
    .password-toggle .form-control {
      padding-right: 40px;
    }
    .login-container, .register-container {
      max-width: 420px;
      margin: 80px auto 40px;
      padding: 30px 25px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }
    body {
      background: #f8f9fc;
    }
    .navbar-brand {
      font-size: 1.4rem;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-md navbar-light bg-light fixed-top">
    <a class="navbar-brand font-weight-bold" href="./login.html">Мир на ладони</a>
  </nav>

  <div class="container">
    <div class="register-container">
      <h2 class="text-center mb-4">Регистрация преподавателя</h2>
      
      <form id="registerForm">
        <div class="form-group">
          <input type="text" class="form-control" id="name" placeholder="Имя" required>
        </div>
        <div class="form-group">
          <input type="text" class="form-control" id="surname" placeholder="Фамилия" required>
        </div>
        <div class="form-group">
          <input type="email" class="form-control" id="email" placeholder="Электронная почта" required>
        </div>
        <div class="form-group password-toggle">
          <input type="password" class="form-control" id="password" placeholder="Пароль" required>
          <button type="button" class="toggle-eye" id="toggleRegisterPassword" aria-label="Показать пароль">
            <i class="fa-regular fa-eye" id="registerEyeIcon"></i>
          </button>
        </div>
        <div class="form-group">
          <input type="text" class="form-control" id="inviteCode" placeholder="Код приглашения" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
      </form>

      <div class="text-center mt-3">
        <a href="./login.html" class="btn btn-outline-secondary btn-block">Отмена</a>
      </div>

      <div id="registerMessage" class="mt-3"></div>
    </div>
  </div>

  <!-- Подключаем Font Awesome для иконок глаза -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="./js/scripts.js"></script>
  <script>
    (function() {
      const registerPasswordInput = document.getElementById('password');
      const registerToggleBtn = document.getElementById('toggleRegisterPassword');
      const registerEyeIcon = document.getElementById('registerEyeIcon');

      if (registerToggleBtn && registerPasswordInput && registerEyeIcon) {
        registerToggleBtn.addEventListener('click', function(e) {
          e.preventDefault();
          const type = registerPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
          registerPasswordInput.setAttribute('type', type);
          // меняем иконку
          if (type === 'text') {
            registerEyeIcon.className = 'fa-regular fa-eye-slash';
          } else {
            registerEyeIcon.className = 'fa-regular fa-eye';
          }
        });
      }
    })();
  </script>
</body>
</html>
