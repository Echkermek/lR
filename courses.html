<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Remote - Курсы</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-md navbar-light bg-light fixed-top">
    <a class="navbar-brand font-weight-bold" href="./courses.html">Learn Remote</a>
    <div class="navbar-nav mr-auto">
      <a class="nav-link active" href="./courses.html">Курсы</a>
      <a class="nav-link" href="./groups.html">Группы</a>
      <a class="nav-link" href="./notifications.html">Уведомления</a>
      <a class="nav-link" href="./material.html">Материалы</a>
      <a class="nav-link" href="./debtors.html">Должники</a>
      <a class="nav-link" href="./manual-answers.html">Проверка ответов</a>
      <a class="nav-link" href="./admin.html">Админ</a>
    </div>
    <div class="navbar-text mr-3">
      <strong id="teacherName"></strong>
    </div>
    <a class="nav-link text-danger font-weight-bold" href="#" onclick="logout()">Выход</a>
  </nav>

  <div class="container">
    <h2 class="mb-4">Курсы</h2>

    <ul class="nav nav-tabs" id="courseTabs" role="tablist">
      <li class="nav-item">
        <a class="nav-link active" id="active-tab" data-toggle="tab" href="#active" role="tab" aria-controls="active" aria-selected="true">
          Доступные курсы
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" id="completed-tab" data-toggle="tab" href="#completed" role="tab" aria-controls="completed" aria-selected="false">
          Завершенные курсы
        </a>
      </li>
    </ul>

    <div class="tab-content" id="courseTabsContent">

      <div class="tab-pane fade show active" id="active" role="tabpanel" aria-labelledby="active-tab">
        <div id="activeCoursesList" class="row mt-3">
          <div class="col-12 text-center">
            <div class="spinner-border text-primary" role="status">
              <span class="sr-only">Загрузка...</span>
            </div>
            <p class="mt-2">Загрузка курсов...</p>
          </div>
        </div>
      </div>

      <div class="tab-pane fade" id="completed" role="tabpanel" aria-labelledby="completed-tab">
        <div id="completedCoursesList" class="row mt-3">
          <div class="col-12 text-center">
            <div class="spinner-border text-primary" role="status">
              <span class="sr-only">Загрузка...</span>
            </div>
            <p class="mt-2">Загрузка курсов...</p>
          </div>
        </div>
      </div>
    </div>

    <div class="card mt-4">
      <div class="card-header bg-info text-white">
        <h5 class="mb-0">Добавить новый курс</h5>
      </div>
      <div class="card-body">
        <div class="input-group">
          <input type="text" id="newCourse" class="form-control" placeholder="Название нового курса">
          <div class="input-group-append">
            <button class="btn btn-primary" onclick="addCourse()">Добавить курс</button>
          </div>
        </div>
        <div id="addCourseMessage" class="mt-2"></div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="./js/scripts.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      console.log('Страница курсов загружена');
      if (typeof initCoursesPage === 'function') {
        initCoursesPage();
      } else {
        console.error('Функция initCoursesPage не найдена');
      }
    });
  </script>
</body>
</html>
