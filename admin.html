<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learn Remote - Админ</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <style>
    body { padding-top: 80px; background-color: #f8f9fa; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-md navbar-light bg-light fixed-top">
    <a class="navbar-brand font-weight-bold" href="./courses.html">Learn Remote</a>
    <div class="navbar-nav mr-auto">
      <a class="nav-link" href="./courses.html">Курсы</a>
      <a class="nav-link" href="./groups.html">Группы</a>
      <a class="nav-link" href="./notifications.html">Уведомления</a>
      <a class="nav-link" href="./material.html">Материалы</a>
      <a class="nav-link active" href="./admin.html">Админ</a>
    </div>
    <div class="navbar-text mr-3">
      <strong id="teacherName"></strong>
    </div>
    <a class="nav-link text-danger font-weight-bold" href="#" onclick="logout()">Exit</a>
  </nav>

  <div class="container">
    <h2 class="mb-4">Панель администратора</h2>

    <div class="card mb-4">
      <div class="card-header bg-info text-white">
        <h5 class="mb-0">Сгенерировать код приглашения</h5>
      </div>
      <div class="card-body">
        <button class="btn btn-primary" onclick="generateInviteCode()">Сгенерировать код приглашения</button>
        <div id="codeMessage" class="mt-2"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header bg-info text-white">
        <h5 class="mb-0">Список преподавателей</h5>
      </div>
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead class="thead-light">
            <tr>
              <th>Имя</th>
              <th>Фамилия</th>
              <th>Email</th>
              <th>Дата последнего входа</th>
            </tr>
          </thead>
          <tbody id="teachersList">
          </tbody>
        </table>
      </div>
    </div>
  </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyD2QJQcuUI9lCJP_kqp5tW24J8TN6phPWw",
        authDomain: "prob1-5c047.firebaseapp.com",
        projectId: "prob1-5c047",
        storageBucket: "prob1-5c047.appspot.com",
        messagingSenderId: "1083579621866",
        appId: "1:1083579621866:web:73f214d8fd992f0d52d293"
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

    if (!localStorage.getItem('teacherId')) {
      window.location.href = './login.html';
    }

    function logout() {
      localStorage.removeItem('teacherId');
      localStorage.removeItem('teacherName');
      localStorage.removeItem('teacherSurname');
      localStorage.removeItem('teacherEmail');
      window.location.href = './login.html';
    }

    // Показываем имя преподавателя
    document.getElementById('teacherName').textContent = 
      `${localStorage.getItem('teacherName')} ${localStorage.getItem('teacherSurname')}`;

    // Загрузка списка преподавателей
    function loadTeachers() {
      db.collection("teacher").orderBy("createdAt", "desc").onSnapshot(snap => {
        const tbody = document.getElementById("teachersList");
        tbody.innerHTML = "";
        
        if (snap.empty) {
          tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">Нет преподавателей</td></tr>`;
          return;
        }
        
        snap.forEach(doc => {
          const teacher = doc.data();
          const tr = document.createElement("tr");
          
          const lastLogin = teacher.last_login_time ? 
            new Date(teacher.last_login_time.toDate()).toLocaleString('ru-RU') : 
            'Никогда';
            
          tr.innerHTML = `
            <td>${teacher.name}</td>
            <td>${teacher.surname}</td>
            <td>${teacher.login}</td>
            <td>${lastLogin}</td>
          `;
          tbody.appendChild(tr);
        });
      });
    }

    // Генерация кода приглашения
    function generateInviteCode() {
      const code = generateRandomCode(8);
      const messageDiv = document.getElementById('codeMessage');
      
      db.collection("invite_codes").add({
        code: code,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        used: false,
        createdBy: localStorage.getItem('teacherId')
      }).then(() => {
        messageDiv.innerHTML = `<div class="alert alert-success">Код приглашения: <strong>${code}</strong></div>`;
      }).catch(error => {
        messageDiv.innerHTML = `<div class="alert alert-danger">Ошибка генерации кода: ${error.message}</div>`;
      });
    }

    // Генерация случайного кода
    function generateRandomCode(length) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let result = '';
      for (let i = 0; i < length; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return result;
    }

    // Инициализация
    loadTeachers();
  </script>
</body>
</html>
